name: Run Selenium Tests with Allure (Browser Matrix)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install browsers
      run: |
        sudo apt-get update

        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt install -y ./google-chrome-stable_current_amd64.deb

        curl https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg

        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/edge stable main" | sudo tee /etc/apt/sources.list.d/microsoft-edge.list

        sudo apt update

        sudo apt install -y \
          microsoft-edge-stable \
          firefox-esr

    # Install Allure CLI
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
        unzip allure-2.29.0.zip
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure


    # Run tests for each browser (parallel execution)
    - name: Run tests on ${{ matrix.browser }}
      run: |
        if [ "${{ matrix.browser }}" = "firefox" ]; then
          pytest -n 1 --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        else
          pytest -n auto --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        fi
      continue-on-error: true

      - name: Upload geckodriver log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geckodriver-log-${{ matrix.browser }}
          path: geckodriver.log

    # Upload per-browser Allure results
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: allure-results/${{ matrix.browser }}

  merge:
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Download all browser artifacts
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        path: merged-results

    # Download previous history
    - name: Download previous Allure history
      run: |
        git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages
        if [ -d "gh-pages/history" ]; then
          mkdir -p merged-results/history
          cp -r gh-pages/history/* merged-results/history/
        fi

    # Merge all browser results dynamically
    - name: Merge Allure Results
      run: |
        mkdir -p final-results
        # Copy history
        if [ -d "merged-results/history" ]; then
          cp -r merged-results/history final-results/history
        fi
        # Merge all browser folders
        for dir in merged-results/*; do
          cp -r "$dir"/* final-results/ || true
        done

    # Generate final Allure report
    - name: Generate Allure Report
      run: allure generate final-results -o allure-report --clean

    # Upload final report
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

  deploy:
    runs-on: ubuntu-latest
    needs: merge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
