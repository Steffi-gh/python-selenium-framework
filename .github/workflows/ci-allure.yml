name: Run Selenium Tests with Allure (Browser Matrix)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # Install browsers
    - name: Install Browsers
      run: |
        sudo apt-get update
        sudo apt-get install -y firefox
        sudo apt-get install -y microsoft-edge-stable || true

     # Install Chrome
    - name: Install Google Chrome
      run: |
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get update
        sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

    # Install ChromeDriver matching Chrome version
    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | sed 's/Google Chrome //')
        DRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION%%.*}")
        wget https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VERSION}/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver

    # Install Allure CLI (correct method for Ubuntu 24.04)
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
        unzip allure-2.29.0.zip
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # Run tests for each browser
    - name: Run tests on ${{ matrix.browser }}
      run: pytest --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
      continue-on-error: true

   # Download previous Allure history
    - name: Download previous Allure history
      run: |
        git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages
        if [ -d "gh-pages/history" ]; then
          mkdir -p allure-results/history
          cp -r gh-pages/history/* allure-results/history/
        fi

    # Merge browser-specific results
    - name: Merge Allure Results
      run: |
        mkdir -p merged-results
        cp -r allure-results/history merged-results/history || true
        cp -r allure-results/*/* merged-results/ || true


    - name: Generate Allure Report
      run: allure generate allure-results -o allure-report --clean

    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Copy categories.json
      run: |
        mkdir -p allure-results
        cp allure/categories.json allure-results/categories.json


  deploy:
    runs-on: ubuntu-latest
    needs: tests   # waits for all browser jobs to finish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          