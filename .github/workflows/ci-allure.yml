name: Run Selenium Tests with Allure (Browser Matrix)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Browser versions
      run: |
        google-chrome --version || true
        firefox --version || true
        microsoft-edge --version || true

    # Run tests for each browser (parallel execution)
    - name: Run tests on ${{ matrix.browser }}
      run: |
        if [ "${{ matrix.browser }}" = "firefox" ]; then
          pytest -n 1 --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        else
          pytest -n auto --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        fi
      continue-on-error: true

    - name: Upload geckodriver log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: geckodriver-log-${{ matrix.browser }}
        path: geckodriver.log

    # Upload per-browser Allure results
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: allure-results/${{ matrix.browser }}

  merge:
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Download all browser artifacts into distinct subdirectories
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        path: merged-results

    # Download previous history
    - name: Download previous Allure history
      run: |
        git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages || true
        if [ -d "gh-pages/history" ]; then
          mkdir -p final-results/history
          cp -r gh-pages/history/* final-results/history/
        fi

# FIX: Keep results separated in subfolders so they don't overwrite each other
    - name: Prepare Unique Allure Results & Inject Metadata
      run: |
        mkdir -p final-results-merged
        
        for dir in merged-results/allure-results-*; do
          if [ -d "$dir" ]; then
            BROWSER_NAME=$(basename "$dir" | sed 's/allure-results-//')
            
            # Inject metadata directly into each browser's specific directory
            echo "Browser=${BROWSER_NAME}" > "$dir/environment.properties"
            echo "Environment=GitHub Actions CI" >> "$dir/environment.properties"
            echo "{\"name\":\"${BROWSER_NAME^^} Execution\",\"type\":\"github\",\"buildName\":\"Run #${{ github.run_number }} - ${BROWSER_NAME}\"}" > "$dir/executor.json"
            
            # Move the entire unique folder into our staging area
            cp -r "$dir" final-results-merged/
          fi
        done

        # Copy the history trend data into the staging area root if it exists
        if [ -d "final-results/history" ]; then
          mkdir -p final-results-merged/history
          cp -r final-results/history/* final-results-merged/history/
        fi

    # Install Allure CLI on this runner machine
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # FIX: Pass the wild-card directory path so Allure processes all browser folders safely
    - name: Generate Final Merged Allure Report
      run: allure generate final-results-merged/allure-results-* -o allure-report --clean

    - name: Copy history into final report
      run: |
        if [ -d "final-results-merged/history" ]; then
          mkdir -p allure-report/history
          cp -r final-results-merged/history/* allure-report/history/
        fi

    # Upload final report
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

  deploy:
    runs-on: ubuntu-latest
    needs: merge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages