name: Run Selenium Tests with Allure (Browser Matrix)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    # Install browsers
    - name: Install Browsers
      run: |
        sudo apt-get update
        sudo apt-get install -y firefox
        sudo apt-get install -y microsoft-edge-stable || true

    # Install jq
    - name: Install jq
      run: sudo apt-get install -y jq

    # Install Chrome
    - name: Install Google Chrome
      run: |
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo apt-get update
        sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

    # Install ChromeDriver
    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | sed 's/Google Chrome //')
        DRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION%%.*}")
        wget https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VERSION}/linux64/chromedriver-linux64.zip
        unzip chromedriver-linux64.zip
        sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver

    # Install Allure CLI
    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.zip
        unzip allure-2.29.0.zip
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure


    - name: Install Firefox (Ubuntu 24.04)
      run: |
        sudo add-apt-repository -y ppa:mozillateam/ppa
        echo '
        Package: *
        Pin: release o=LP-PPA-mozillateam
        Pin-Priority: 1001
        ' | sudo tee /etc/apt/preferences.d/mozilla-firefox
        sudo apt-get update
        sudo apt-get install -y firefox

    # Install GeckoDriver
    - name: Install GeckoDriver
      run: |
        GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | jq -r '.tag_name')
        wget https://github.com/mozilla/geckodriver/releases/download/$GECKO_VERSION/geckodriver-$GECKO_VERSION-linux64.tar.gz
        tar -xzf geckodriver-$GECKO_VERSION-linux64.tar.gz
        sudo mv geckodriver /usr/bin/geckodriver
        sudo chmod +x /usr/bin/geckodriver

    # Install Edge + EdgeDriver
    - name: Install Microsoft Edge
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo apt-get install -y apt-transport-https
        sudo apt-get install -y wget
        wget https://packages.microsoft.com/keys/microsoft.asc -O- | sudo apt-key add -
        sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/repos/edge stable main"
        sudo apt-get update
        sudo apt-get install -y microsoft-edge-stable

    # Install required Linux libraries for headless browsers
    - name: Install browser dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-0 \
          libdbus-glib-1-2 \
          libxt6 \
          libxss1 \
          libnss3 \
          libxrandr2 \
          libxdamage1 \
          libxcomposite1 \
          libxfixes3 \
          libxkbcommon0 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libatk1.0-0 \
          libcairo2 \
          libgdk-pixbuf-2.0-0 \
          libasound2t64

    - name: Install Firefox sandbox dependencies
      run: |
        sudo apt-get install -y \
          libgtk-3-0 \
          libdbus-glib-1-2 \
          libxt6 \
          libxss1 \
          libnss3 \
          libxrandr2 \
          libxdamage1 \
          libxcomposite1 \
          libxfixes3 \
          libxkbcommon0 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libatk1.0-0 \
          libcairo2 \
          libgdk-pixbuf-2.0-0 \
          libasound2t64 \
          libavcodec-extra

    # Run tests for each browser (parallel execution)
    - name: Run tests on ${{ matrix.browser }}
      run: |
        if [ "${{ matrix.browser }}" = "firefox" ]; then
          pytest -n 1 --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        else
          pytest -n auto --browser=${{ matrix.browser }} --alluredir=allure-results/${{ matrix.browser }}
        fi
      continue-on-error: true

    # Upload per-browser Allure results
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: allure-results/${{ matrix.browser }}

  merge:
    runs-on: ubuntu-latest
    needs: tests

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Download all browser artifacts
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        path: merged-results

    # Download previous history
    - name: Download previous Allure history
      run: |
        git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages
        if [ -d "gh-pages/history" ]; then
          mkdir -p merged-results/history
          cp -r gh-pages/history/* merged-results/history/
        fi

    # Merge all browser results dynamically
    - name: Merge Allure Results
      run: |
        mkdir -p final-results
        # Copy history
        if [ -d "merged-results/history" ]; then
          cp -r merged-results/history final-results/history
        fi
        # Merge all browser folders
        for dir in merged-results/*; do
          cp -r "$dir"/* final-results/ || true
        done

    # Generate final Allure report
    - name: Generate Allure Report
      run: allure generate final-results -o allure-report --clean

    # Upload final report
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report

  deploy:
    runs-on: ubuntu-latest
    needs: merge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
